services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: durgasankaran/receipe-sharing-app-backend:latest
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/recipeApp
      JWT_SECRET: secretkey
      EMAIL_USER: durgas2440@gmail.com
      EMAIL_PASS: gwxj wgsw ghvz swqi
    depends_on:
      - mongo

  frontend:
    image: durgasankaran/receipe-sharing-app-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
    - "9090:9090"
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
    - "3001:3000"
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"

volumes:
  mongo_data: